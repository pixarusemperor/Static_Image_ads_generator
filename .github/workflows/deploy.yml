# =============================================================================
# Coolify Deploy — Static_Image_ads_generator
#
# Triggers:
#   Push to the `master` branch
#
# Flow:
#   1. PATCH Coolify API to trigger an instant deploy
#   2. Poll deployment status every 15 s until finished/failed or 10-min timeout
#
# Secrets required (set in repo Settings → Secrets and variables → Actions):
#   COOLIFY_API_TOKEN — Coolify API bearer token (value: "1|cool_TOKEN")
# =============================================================================

name: Deploy to Coolify

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Only one deploy at a time per branch; new pushes cancel the old one
concurrency:
  group: coolify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12          # 2 min buffer above the 10-min poll loop

    steps:

      # -------------------------------------------------------------------
      # STEP 1 — Trigger the Coolify deployment
      # -------------------------------------------------------------------
      - name: Trigger Coolify deploy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          APP_UUID: "jygt5ernjovbf36q391orfs2"
        run: |
          set -euo pipefail

          echo "==> Triggering instant deploy for app ${APP_UUID}"

          RESPONSE=$(curl -k -s -S --fail-with-body \
            -X PATCH \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"instant_deploy": true}' \
            "https://coolifyone.orizongroup.online/api/v1/applications/${APP_UUID}")

          echo "==> API response:"
          echo "${RESPONSE}" | jq .

          DEPLOY_UUID=$(echo "${RESPONSE}" | jq -r '.deployment_uuid // .uuid // "unknown"')
          echo "deployment_uuid=${DEPLOY_UUID}" >> "${GITHUB_OUTPUT}"
          echo "==> Deployment UUID: ${DEPLOY_UUID}"

        id: trigger

      # -------------------------------------------------------------------
      # STEP 2 — Poll until terminal state or timeout
      # -------------------------------------------------------------------
      - name: Wait for deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          APP_UUID: "jygt5ernjovbf36q391orfs2"
        run: |
          set -euo pipefail

          MAX_ATTEMPTS=40          # 40 × 15 s = 10 minutes
          INTERVAL=15

          echo "==> Polling deployment status for app ${APP_UUID}"
          echo "==> Max attempts: ${MAX_ATTEMPTS}   Interval: ${INTERVAL} s"

          for i in $(seq 1 ${MAX_ATTEMPTS}); do
            echo ""
            echo "--- Attempt ${i}/${MAX_ATTEMPTS} at $(date -u +%H:%M:%S) UTC ---"

            RESPONSE=$(curl -k -s -S \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              -H "Accept: application/json" \
              "https://coolifyone.orizongroup.online/api/v1/deployments/applications/${APP_UUID}")

            STATUS=$(echo "${RESPONSE}" | jq -r '.deployments[0].status // "unknown"')

            echo "Current status: ${STATUS}"

            case "${STATUS}" in
              finished)
                echo ""
                echo "=============================================="
                echo "✓ DEPLOY SUCCEEDED"
                echo "=============================================="
                exit 0
                ;;
              failed)
                echo ""
                echo "=============================================="
                echo "✗ DEPLOY FAILED"
                echo "=============================================="
                echo "${RESPONSE}" | jq .
                exit 1
                ;;
              queued|building|deploying|*)
                echo "Deployment in progress (${STATUS})… waiting ${INTERVAL} s"
                sleep ${INTERVAL}
                ;;
            esac
          done

          echo ""
          echo "=============================================="
          echo "✗ TIMEOUT — deployment did not finish within 10 minutes"
          echo "=============================================="
          exit 1
